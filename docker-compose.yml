services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: nomina-app
        ports:
            - "8000:8000"
        environment:
            APP_ENV: local
            APP_KEY: ${APP_KEY}
            APP_DEBUG: "true"
            APP_LOCALE: es
            APP_TIMEZONE: America/Tegucigalpa
            DB_CONNECTION: pgsql
            DB_HOST: nomina-db
            DB_PORT: 5432
            DB_DATABASE: nomina
            DB_USERNAME: nomina
            DB_PASSWORD: secret
        depends_on:
            - db
        volumes:
            - .:/var/www/html
        networks:
            - nomina

    db:
        image: postgres:15-alpine
        container_name: nomina-db
        environment:
            POSTGRES_DB: nomina
            POSTGRES_USER: nomina
            POSTGRES_PASSWORD: secret
        ports:
            - "5432:5432"
        volumes:
            - nomina-db-data:/var/lib/postgresql/data
        networks:
            - nomina

    nomina-test-db:
        image: postgres:15-alpine
        profiles: [testing]
        environment:
            POSTGRES_DB: nomina_test
            POSTGRES_USER: nomina_test
            POSTGRES_PASSWORD: nomina_test
        ports:
            - "127.0.0.1:55432:5432"
        tmpfs:
            - /var/lib/postgresql/data
        healthcheck:
            test: [CMD-SHELL, "pg_isready -U nomina_test -d nomina_test"]
            interval: 1s
            timeout: 5s
            retries: 20
        networks:
            - nomina

volumes:
    nomina-db-data:

networks:
    nomina:
        driver: bridge
